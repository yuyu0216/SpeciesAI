<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>夥伴對話 — 誰動了我的棲地！</title>
  <meta name="description" content="與你的物種夥伴對話，探索生態世界的秘密。" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ══ Chat Page Layout ══════════════════════════════ */
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      padding: 0;
    }

    /* ── Top Header ── */
    .chat-header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(13, 31, 15, 0.9);
      border-bottom: 1px solid var(--color-border-bright);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .species-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-primary-dim), var(--color-primary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 0 16px var(--color-primary-glow);
      animation: pulseGlow 3s ease-in-out infinite;
    }

    .header-info { min-width: 0; }
    .header-name {
      font-weight: 800;
      font-size: 17px;
      color: var(--color-text-h);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-code {
      font-size: 13px;
      color: var(--color-text-dim);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .round-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: rgba(168, 224, 99, 0.1);
      border: 1px solid rgba(168, 224, 99, 0.3);
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      color: var(--color-accent);
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--color-border-bright);
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      color: var(--color-text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font-main);
    }
    .logout-btn:hover { border-color: var(--color-error); color: var(--color-error); }

    /* ── Species Info Panel ── */
    .species-panel {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 14px 20px;
      background: rgba(16, 36, 18, 0.8);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
      overflow: hidden;
    }

    .species-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(77,222,111,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .species-emoji-big {
      font-size: 36px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 8px rgba(77,222,111,0.4));
    }

    .species-info { flex: 1; min-width: 0; }
    .species-name-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--color-primary-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .species-name {
      font-size: 18px;
      font-weight: 900;
      color: var(--color-primary);
      margin: 2px 0 6px;
    }
    .species-body-desc {
      font-size: 14px;
      color: var(--color-text);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .panel-stats {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
      text-align: right;
    }
    .stat-row {
      font-size: 13px;
      color: var(--color-text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: flex-end;
    }
    .stat-val { font-weight: 700; color: var(--color-text); }

    /* ── Chat Area ── */
    .chat-main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      opacity: 0.6;
      text-align: center;
      padding: 40px;
    }
    .empty-emoji { font-size: 56px; }
    .empty-title { font-size: 18px; font-weight: 700; color: var(--color-text-h); }
    .empty-sub   { font-size: 14px; color: var(--color-text-dim); max-width: 280px; }

    /* ── Message Bubbles ── */
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: slideIn 0.3s ease both;
    }
    .msg-row.user  { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .msg-row.ai   .msg-avatar { background: var(--color-surface-2); }
    .msg-row.user .msg-avatar { background: var(--color-user-bubble); }

    .bubble {
      max-width: 72%;
      padding: 13px 17px;
      border-radius: var(--radius-md);
      font-size: var(--font-size-base);
      line-height: 1.65;
      position: relative;
      word-break: break-word;
    }
    .msg-row.ai   .bubble {
      background: var(--color-ai-bubble);
      border: 1px solid var(--color-ai-border);
      color: var(--color-ai-text);
      border-bottom-left-radius: 4px;
    }
    .msg-row.user .bubble {
      background: var(--color-user-bubble);
      border: 1px solid var(--color-user-border);
      color: var(--color-user-text);
      border-bottom-right-radius: 4px;
    }

    .bubble-round {
      font-size: 11px;
      font-weight: 700;
      opacity: 0.5;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .bubble-text { white-space: pre-wrap; }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }
    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--color-primary);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%             { transform: scale(1.1); opacity: 1; }
    }

    /* Round divider */
    .round-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--color-text-dim);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .round-divider::before, .round-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    /* ── Input Bar ── */
    .chat-input-area {
      position: relative;
      z-index: 10;
      padding: 16px 20px;
      background: rgba(13, 31, 15, 0.9);
      border-top: 1px solid var(--color-border-bright);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #chatInput {
      flex: 1;
      background: rgba(0,0,0,0.35);
      border: 1.5px solid var(--color-border-bright);
      border-radius: var(--radius-md);
      padding: 13px 18px;
      font-family: var(--font-main);
      font-size: var(--font-size-base);
      color: var(--color-text-h);
      outline: none;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color var(--transition), box-shadow var(--transition);
      line-height: 1.5;
    }
    #chatInput::placeholder { color: var(--color-text-dim); }
    #chatInput:focus {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-glow);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--color-primary-dim), var(--color-primary));
      border: none;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), filter var(--transition);
      box-shadow: 0 4px 16px rgba(77,222,111,0.3);
    }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(77,222,111,0.5); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .input-hint {
      font-size: 12px;
      color: var(--color-text-dim);
      margin-top: 8px;
      text-align: center;
    }

    /* ── Network alert ── */
    #networkBanner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255,169,77,0.18);
      border-bottom: 1px solid rgba(255,169,77,0.4);
      color: var(--color-warning);
      text-align: center;
      padding: 10px;
      font-size: 14px;
      font-weight: 700;
      z-index: 9999;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .species-panel { flex-wrap: wrap; }
      .panel-stats   { flex-direction: row; width: 100%; justify-content: flex-start; text-align: left; }
      .stat-row      { justify-content: flex-start; }
      .bubble        { max-width: 88%; }
      .chat-header   { padding: 12px 14px; }
    }
  </style>
</head>
<body>

<div id="networkBanner">📡 正在等待回應…</div>
<div id="toast"></div>

<!-- ── Header ── -->
<header class="chat-header" id="chatHeader">
  <div class="header-left">
    <!-- 固定顯示神秘問號，不透露物種 -->
    <div class="species-avatar">🌿</div>
    <div class="header-info">
      <div class="header-name" id="headerTitle">神秘夥伴</div>
      <div class="header-code" id="headerCode">—</div>
    </div>
  </div>
  <div class="header-right">
    <div class="round-badge" id="roundBadge">⏱ 回合 —</div>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </div>
</header>

<!-- ── Clue Panel (不顯示物種名稱，只顯示身體感知線索) ── -->
<section class="species-panel" id="speciesPanel">
  <div class="species-emoji-big">🔍</div>
  <div class="species-info">
    <div class="species-name-label">夥伴說的話</div>
    <div class="species-body-desc" id="panelBodyDesc">正在連接你的神秘夥伴…</div>
  </div>
  <div class="panel-stats" id="panelStats">
    <div class="stat-row">
      <span>族群：</span><span class="stat-val" id="statPop">—</span>
    </div>
    <div class="stat-row">
      <span>食物：</span><span class="stat-val" id="statFood">—</span>
    </div>
    <div class="stat-row">
      <span>棲地：</span><span class="stat-val" id="statHabitat">—</span>
    </div>
    <div class="stat-row">
      狀態：<span id="statHunger" class="status-badge normal">正常</span>
    </div>
  </div>
</section>

<!-- ── Chat Main ── -->
<main class="chat-main" id="chatMain">
  <div class="empty-state" id="emptyState">
    <div class="empty-emoji">🌱</div>
    <div class="empty-title">你好，我是你的物種夥伴</div>
    <div class="empty-sub">試著問我關於生活、食物、還有這片棲地的事吧！</div>
  </div>
</main>

<!-- ── Input Bar ── -->
<div class="chat-input-area">
  <div class="input-row">
    <textarea
      id="chatInput"
      rows="1"
      placeholder="跟你的物種夥伴說說話…"
      oninput="autoResize(this)"
      onkeydown="handleInputKey(event)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="送出 (Enter)">
      🪴
    </button>
  </div>
  <div class="input-hint">按 Enter 送出 · Shift+Enter 換行</div>
</div>

<script src="config.js"></script>
<script>
// ════════════════════════════════════════════════
// Chat Page Script
// ════════════════════════════════════════════════

let student   = null;
let gameState = null;
let isSending = false;

// species → emoji mapping
const SPECIES_EMOJI = {
  '紅火蟻': '🐜',
  '臺灣黑熊': '🐻',
  '梅花鹿': '🦌',
  '石虎': '🐆',
  '台灣藍鵲': '🦜',
  '綠鬣蜥': '🦎',
  '福壽螺': '🐌',
  '山羌': '🦌',
  '獼猴': '🐒',
  '布袋蓮': '🪷',
};
function speciesEmoji(name) {
  return SPECIES_EMOJI[name] || '🌿';
}

// ── Init ──────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const raw = sessionStorage.getItem('student');
  if (!raw) { window.location.href = 'index.html'; return; }
  student = JSON.parse(raw);

  // 只顯示姓名與代號，不顯示物種名稱或圖示（讓學生自己猜）
  document.getElementById('headerCode').textContent    = `${student.name} · ${student.player_code}`;
  document.getElementById('panelBodyDesc').textContent = student.bodyDesc || '正在感知這片棲地…';

  // Load game state & history in parallel
  await Promise.all([
    loadGameState(),
    loadHistory(),
  ]);
});

// ── Game State ────────────────────────────────
async function loadGameState() {
  try {
    const url = `${GAS_URL}?action=getState&player_code=${encodeURIComponent(student.player_code)}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.ok && data.state) {
      gameState = data.state;
      renderState(data.state);
    }
  } catch (_) { /* silent */ }
}

function renderState(state) {
  document.getElementById('roundBadge').textContent    = `⏱ 第 ${state.round} 回合`;
  document.getElementById('statPop').textContent       = `${state.population} 隻`;
  document.getElementById('statFood').textContent      = String(state.food_available);
  document.getElementById('statHabitat').textContent   = state.habitat || '—';

  const badge = document.getElementById('statHunger');
  const statusMap = { normal: ['正常','normal'], hungry: ['飢餓','hungry'], starving: ['非常飢餓','starving'] };
  const [label, cls] = statusMap[state.hunger_status] || ['正常','normal'];
  badge.textContent = label;
  badge.className   = `status-badge ${cls}`;
}

// ── Load History ──────────────────────────────
async function loadHistory() {
  try {
    const url = `${GAS_URL}?action=getHistory&name=${encodeURIComponent(student.name)}&player_code=${encodeURIComponent(student.player_code)}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.ok && Array.isArray(data.history) && data.history.length > 0) {
      document.getElementById('emptyState').style.display = 'none';
      let lastRound = null;
      for (const msg of data.history) {
        if (msg.round !== lastRound) {
          appendRoundDivider(msg.round);
          lastRound = msg.round;
        }
        appendBubble(msg.role, msg.message, false, msg.round);
      }
      scrollBottom();
    }
  } catch (_) { /* silent */ }
}

// ── Send Message ──────────────────────────────
async function sendMessage() {
  if (isSending) return;
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text) return;

  isSending = true;
  setSendDisabled(true);
  document.getElementById('emptyState').style.display = 'none';

  // Append user bubble
  const currentRound = gameState ? gameState.round : 1;
  appendBubble('user', text, true, currentRound);
  input.value = '';
  autoResize(input);

  // Show typing
  const typingId = showTyping();

  try {
    showNetworkBanner(true);
    // ⚠️ Content-Type 必須用 text/plain 才能避免 CORS preflight
    // GAS 的 doPost 仍可正常用 JSON.parse(e.postData.contents) 讀取
    const res  = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action:      'chat',
        name:        student.name,
        player_code: student.player_code,
        message:     text,
        round:       currentRound,
      }),
    });
    const data = await res.json();
    hideTyping(typingId);
    showNetworkBanner(false);

    if (data.ok) {
      appendBubble('assistant', data.reply, true, currentRound);
    } else {
      appendBubble('assistant', '我好累…等等再說好嗎？', true, currentRound);
    }
    // Refresh state silently
    loadGameState();

  } catch (_) {
    hideTyping(typingId);
    showNetworkBanner(false);
    appendBubble('assistant', '我好累…等等再說好嗎？', true, currentRound);
  }

  isSending = false;
  setSendDisabled(false);
  scrollBottom();
  input.focus();
}

// ── DOM helpers ───────────────────────────────

function appendBubble(role, text, animate, round) {
  const container = document.getElementById('chatMain');
  const row = document.createElement('div');
  row.className = `msg-row ${role === 'user' ? 'user' : 'ai'}`;
  if (animate) row.style.animation = 'slideIn 0.3s ease both';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  // 永遠使用神秘葉子圖示，不透露物種 emoji
  avatar.textContent = role === 'user' ? '🙋' : '🌿';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  const textEl = document.createElement('div');
  textEl.className = 'bubble-text';
  textEl.textContent = text;
  bubble.appendChild(textEl);

  if (role === 'user') {
    row.appendChild(bubble);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(bubble);
  }
  container.appendChild(row);
}

function appendRoundDivider(round) {
  const container = document.getElementById('chatMain');
  const div = document.createElement('div');
  div.className = 'round-divider';
  div.textContent = `第 ${round} 回合`;
  container.appendChild(div);
}

function showTyping() {
  const container = document.getElementById('chatMain');
  const row = document.createElement('div');
  const id  = 'typing-' + Date.now();
  row.id        = id;
  row.className = 'msg-row ai';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  // typing indicator 也用神秘圖示
  avatar.textContent = '🌿';

  const bubble = document.createElement('div');
  bubble.className = 'bubble typing-bubble';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'typing-dot';
    bubble.appendChild(dot);
  }
  row.appendChild(avatar);
  row.appendChild(bubble);
  container.appendChild(row);
  scrollBottom();
  return id;
}

function hideTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function scrollBottom() {
  const el = document.getElementById('chatMain');
  el.scrollTop = el.scrollHeight;
}

function setSendDisabled(v) {
  document.getElementById('sendBtn').disabled = v;
  document.getElementById('chatInput').disabled = v;
}

function showNetworkBanner(show) {
  document.getElementById('networkBanner').style.display = show ? 'block' : 'none';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function doLogout() {
  sessionStorage.removeItem('student');
  window.location.href = 'index.html';
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 3000);
}
</script>
</body>
</html>
