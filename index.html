<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>誰動了我的棲地！— 夥伴生態輔助系統</title>
  <meta name="description" content="桌遊「誰動了我的棲地！」的 AI 物種夥伴輔助系統，協助學生以物種視角思考生態互動。" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Login Page Specific ── */
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      animation: fadeInUp 0.5s ease both;
    }

    /* Floating leaves decoration */
    .leaves-deco {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .leaf {
      position: absolute;
      font-size: 22px;
      opacity: 0;
      animation: float-leaf linear infinite;
    }
    @keyframes float-leaf {
      0%   { transform: translate(0, 110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translate(var(--dx, 30px), -10vh) rotate(var(--rot, 360deg)); opacity: 0; }
    }

    /* Title section */
    .login-header {
      text-align: center;
      padding: 40px 36px 28px;
    }
    .login-logo {
      font-size: 56px;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 12px rgba(77,222,111,0.5));
      animation: sway 4s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .login-title {
      font-size: 22px;
      font-weight: 900;
      color: var(--color-text-h);
      letter-spacing: 0.04em;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .login-subtitle {
      font-size: 14px;
      color: var(--color-text-dim);
      letter-spacing: 0.08em;
    }

    /* Form body */
    .login-body {
      padding: 8px 36px 40px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    /* Code picker grid */
    .code-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 6px;
    }
    .code-chip {
      padding: 10px 4px;
      text-align: center;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--color-border-bright);
      background: rgba(0,0,0,0.3);
      color: var(--color-text);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      user-select: none;
    }
    .code-chip:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: rgba(77,222,111,0.08);
    }
    .code-chip.selected {
      background: linear-gradient(135deg, var(--color-primary-dim), var(--color-primary));
      border-color: var(--color-primary);
      color: #0a1f0d;
      box-shadow: 0 2px 12px rgba(77,222,111,0.35);
    }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--color-text-dim);
      font-size: 13px;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    /* Error state */
    .error-msg {
      padding: 12px 16px;
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.35);
      border-radius: var(--radius-sm);
      color: var(--color-error);
      font-size: 14px;
      display: none;
    }
    .error-msg.show { display: block; animation: fadeInUp 0.3s ease; }

    /* Loading spinner inside button */
    .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: rgba(0,0,0,0.7);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    /* Bottom note */
    .login-note {
      text-align: center;
      font-size: 13px;
      color: var(--color-text-dim);
      padding-top: 16px;
      border-top: 1px solid var(--color-border);
    }
    .login-note a {
      color: var(--color-primary-dim);
      text-decoration: none;
    }
    .login-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- Floating leaves -->
<div class="leaves-deco" id="leavesDeco"></div>

<!-- Toast -->
<div id="toast"></div>

<div class="login-wrapper">
  <div class="glass-card">
    <!-- Header -->
    <div class="login-header">
      <span class="login-logo">🌿</span>
      <h1 class="login-title">誰動了我的棲地！</h1>
      <p class="login-subtitle">夥伴生態輔助系統</p>
    </div>

    <!-- Form -->
    <div class="login-body">
      <div class="field-group">
        <label class="field-label" for="inputName">你的姓名</label>
        <input
          class="field-input"
          id="inputName"
          type="text"
          placeholder="請輸入你的姓名"
          autocomplete="off"
          maxlength="20"
        />
      </div>

      <div class="field-group">
        <label class="field-label">玩家代號</label>
        <!-- Quick-pick grid -->
        <div class="code-grid" id="codeGrid">
          <!-- generated by JS -->
        </div>
        <div class="or-divider">或直接輸入</div>
        <input
          class="field-input"
          id="inputCode"
          type="text"
          placeholder="例如：R1、G2、B3"
          autocomplete="off"
          maxlength="6"
          style="text-transform:uppercase;"
        />
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button class="btn-primary" id="loginBtn" onclick="doLogin()">
        <div class="btn-spinner" id="btnSpinner"></div>
        <span id="btnText">🌱 進入我的物種世界</span>
      </button>

      <p class="login-note">
        這是研究情境系統，不需要密碼。<br />
        老師 → <a href="admin.html" id="adminLink">教師管理頁面</a>
      </p>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
// ════════════════════════════════════════════════
// Login Page Script
// ════════════════════════════════════════════════

// Player code options
const CODE_PREFIXES = ['R','G','B','Y','P'];
const CODE_NUMBERS  = [1, 2, 3];

function buildCodeGrid() {
  const grid = document.getElementById('codeGrid');
  CODE_PREFIXES.forEach(prefix => {
    CODE_NUMBERS.forEach(num => {
      const code = prefix + num;
      const chip = document.createElement('div');
      chip.className = 'code-chip';
      chip.id = 'chip-' + code;
      chip.textContent = code;
      chip.onclick = () => selectCode(code);
      grid.appendChild(chip);
    });
  });
}

function selectCode(code) {
  document.querySelectorAll('.code-chip').forEach(c => c.classList.remove('selected'));
  const chip = document.getElementById('chip-' + code);
  if (chip) chip.classList.add('selected');
  document.getElementById('inputCode').value = code;
}

// Sync manual input → chip highlight
document.addEventListener('DOMContentLoaded', () => {
  buildCodeGrid();
  buildLeaves();

  document.getElementById('inputCode').addEventListener('input', e => {
    const val = e.target.value.trim().toUpperCase();
    e.target.value = val;
    document.querySelectorAll('.code-chip').forEach(c => c.classList.remove('selected'));
    const chip = document.getElementById('chip-' + val);
    if (chip) chip.classList.add('selected');
  });

  document.getElementById('inputName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inputCode').focus();
  });
  document.getElementById('inputCode').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});

// ── Login ──────────────────────────────────────
async function doLogin() {
  const name        = document.getElementById('inputName').value.trim();
  const player_code = document.getElementById('inputCode').value.trim().toUpperCase();
  const errEl       = document.getElementById('errorMsg');

  errEl.classList.remove('show');

  if (!name) { showError('請輸入你的姓名 😊'); return; }
  if (!player_code) { showError('請選擇或輸入你的玩家代號'); return; }

  setLoading(true);

  try {
    // ⚠️ 所有呼叫一律用 POST + text/plain 避免 CORS 302 redirect 問題
    const res  = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'login', name, player_code }),
    });
    const data = await res.json();

    if (!data.ok) {
      showError(data.error || '登入失敗，請確認姓名與代號');
      setLoading(false);
      return;
    }

    // Store session
    sessionStorage.setItem('student', JSON.stringify({
      name:        data.name,
      player_code: data.player_code,
      species:     data.species,
      team:        data.team,
      bodyDesc:    data.bodyDesc,
    }));

    showToast('歡迎！正在進入你的世界…');
    setTimeout(() => { window.location.href = 'chat.html'; }, 800);

  } catch (err) {
    showError('網路連線異常，請稍後再試');
    setLoading(false);
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('show');
}

function setLoading(on) {
  const btn     = document.getElementById('loginBtn');
  const spinner = document.getElementById('btnSpinner');
  const text    = document.getElementById('btnText');
  btn.disabled      = on;
  spinner.style.display = on ? 'block' : 'none';
  text.style.display    = on ? 'none'  : '';
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 3000);
}

// ── Floating leaves animation ──────────────────
function buildLeaves() {
  const container = document.getElementById('leavesDeco');
  const emojis = ['🍃','🌿','🍀','🌱','🍂'];
  for (let i = 0; i < 18; i++) {
    const leaf = document.createElement('div');
    leaf.className = 'leaf';
    leaf.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const left = Math.random() * 100;
    const dur  = 8 + Math.random() * 12;
    const delay= Math.random() * 15;
    const dx   = (Math.random() - 0.5) * 120;
    const rot  = Math.random() * 720 - 360;
    leaf.style.cssText = `left:${left}%;--dx:${dx}px;--rot:${rot}deg;animation-duration:${dur}s;animation-delay:${delay}s;`;
    container.appendChild(leaf);
  }
}
</script>
</body>
</html>
